<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SciFlow Pro - 重置密码</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://wermvyhppkzoqkrvmopy.supabase.co; img-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --faint: #94a3b8;
      --paper: #f5f7fb;
      --surface: #ffffff;
      --line: #d8e1ec;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --green: #047857;
      --green-soft: #ecfdf5;
      --red: #b42318;
      --red-soft: #fff1f2;
      --amber: #a16207;
      --amber-soft: #fffbeb;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
      letter-spacing: 0;
    }

    .page {
      display: grid;
      min-height: 100vh;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      padding: 42px 18px;
    }

    .shell {
      width: min(960px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(360px, 0.82fr);
      gap: 28px;
      align-items: stretch;
    }

    .intro,
    .panel {
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .intro {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 28px;
      min-height: 520px;
      padding: 34px;
      border-radius: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 850;
    }

    .brand img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.08);
    }

    .brand strong {
      display: block;
      font-size: 18px;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    h1 {
      margin: 0;
      max-width: 560px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .intro-copy {
      display: grid;
      gap: 14px;
    }

    .intro-copy p {
      max-width: 560px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .steps {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .steps li {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      color: #334155;
      font-size: 13px;
    }

    .steps b {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #e8efff;
      color: var(--blue-dark);
      font-size: 12px;
    }

    .panel {
      align-self: center;
      padding: 24px;
      border-radius: 12px;
    }

    .panel-head {
      display: grid;
      gap: 8px;
      margin-bottom: 22px;
    }

    .eyebrow {
      width: fit-content;
      margin: 0;
      padding: 4px 8px;
      border-radius: 7px;
      background: #eef4ff;
      color: var(--blue-dark);
      font-size: 11px;
      font-weight: 850;
    }

    h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: #475569;
      font-size: 11px;
      font-weight: 850;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 11px 14px;
      color: #fff;
      background: var(--blue);
      font-size: 14px;
      font-weight: 850;
      cursor: pointer;
    }

    button:hover {
      background: var(--blue-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .message {
      display: none;
      margin: 0 0 16px;
      border-radius: 8px;
      padding: 11px 12px;
      font-size: 13px;
      font-weight: 720;
    }

    .message[data-tone="success"] {
      display: block;
      color: var(--green);
      background: var(--green-soft);
      border: 1px solid #bbf7d0;
    }

    .message[data-tone="error"] {
      display: block;
      color: var(--red);
      background: var(--red-soft);
      border: 1px solid #fecdd3;
    }

    .message[data-tone="warn"] {
      display: block;
      color: var(--amber);
      background: var(--amber-soft);
      border: 1px solid #fde68a;
    }

    .secondary {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .secondary button {
      width: 100%;
      color: var(--blue-dark);
      background: #eef4ff;
    }

    .secondary button:hover {
      background: #dce9ff;
    }

    .meta {
      margin: 18px 0 0;
      color: var(--faint);
      font-size: 11px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 780px) {
      .page {
        align-items: start;
        padding: 18px 14px;
      }

      .shell {
        grid-template-columns: minmax(0, 1fr);
      }

      .intro {
        min-height: auto;
        padding: 24px;
      }

      .panel {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <section class="intro" aria-label="SciFlow Pro">
        <a class="brand" href="../">
          <img src="../assets/brand/sciflow-mark.svg" alt="">
          <span>
            <strong>SciFlow Pro</strong>
            <span>科研全流程智能工作站</span>
          </span>
        </a>
        <div class="intro-copy">
          <h1>重置你的 SciFlow Pro 登录密码</h1>
          <p>从密码重置邮件进入后，在右侧设置新密码。链接只可使用一次，过期后需要重新发送。</p>
        </div>
        <ul class="steps" aria-label="密码重置流程">
          <li><b>1</b><span>输入注册邮箱，获取一封新的密码重置邮件。</span></li>
          <li><b>2</b><span>从最新邮件打开链接，在本页设置新密码。</span></li>
          <li><b>3</b><span>回到 SciFlow Pro，用新密码重新登录。</span></li>
        </ul>
      </section>

      <section class="panel" aria-label="重置密码">
        <div class="panel-head">
          <p class="eyebrow" id="modeLabel">账号安全</p>
          <h2 id="panelTitle">发送重置邮件</h2>
          <p class="hint" id="panelHint">请输入你的注册邮箱。为了账号安全，页面不会提示邮箱是否存在。</p>
        </div>

        <p class="message" id="message" aria-live="polite"></p>

        <form class="form" id="requestForm" novalidate>
          <div class="field">
            <label for="email">注册邮箱</label>
            <input id="email" name="email" type="email" autocomplete="email" required placeholder="your@email.com">
          </div>
          <button id="requestButton" type="submit">发送重置邮件</button>
        </form>

        <form class="form hidden" id="updateForm" novalidate>
          <div class="field">
            <label for="password">新密码</label>
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required placeholder="至少 8 个字符">
          </div>
          <div class="field">
            <label for="confirmPassword">确认新密码</label>
            <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required placeholder="再次输入新密码">
          </div>
          <button id="updateButton" type="submit">更新密码</button>
        </form>

        <div class="secondary hidden" id="resendBlock">
          <button id="showRequestButton" type="button">重新发送重置邮件</button>
        </div>

        <p class="meta">该页面只使用 Supabase 匿名公开接口处理密码找回，不保存密码或 recovery token。</p>
      </section>
    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://wermvyhppkzoqkrvmopy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_W-W8DiM7crr1Q-6AT-pXrA_UTbbsvyX";
    const REDIRECT_TO = "https://www.sciflowpro.cn/reset-password/index.html";

    const fragment = new URLSearchParams(window.location.hash.slice(1));
    const accessToken = fragment.get("access_token");
    const tokenType = fragment.get("type");
    const errorCode = fragment.get("error_code") || fragment.get("error");
    const errorDescription = fragment.get("error_description");

    const messageEl = document.getElementById("message");
    const modeLabelEl = document.getElementById("modeLabel");
    const panelTitleEl = document.getElementById("panelTitle");
    const panelHintEl = document.getElementById("panelHint");
    const requestForm = document.getElementById("requestForm");
    const updateForm = document.getElementById("updateForm");
    const resendBlock = document.getElementById("resendBlock");
    const requestButton = document.getElementById("requestButton");
    const updateButton = document.getElementById("updateButton");
    const showRequestButton = document.getElementById("showRequestButton");

    function setMessage(text, tone) {
      messageEl.textContent = text;
      messageEl.dataset.tone = tone;
    }

    function clearMessage() {
      messageEl.textContent = "";
      messageEl.removeAttribute("data-tone");
    }

    function showRequestMode() {
      modeLabelEl.textContent = "账号安全";
      panelTitleEl.textContent = "发送重置邮件";
      panelHintEl.textContent = "请输入你的注册邮箱。为了账号安全，页面不会提示邮箱是否存在。";
      requestForm.classList.remove("hidden");
      updateForm.classList.add("hidden");
      resendBlock.classList.add("hidden");
    }

    function showUpdateMode() {
      modeLabelEl.textContent = "密码找回";
      panelTitleEl.textContent = "设置新密码";
      panelHintEl.textContent = "请设置一个新的 SciFlow Pro 登录密码。提交后需要回到应用重新登录。";
      requestForm.classList.add("hidden");
      updateForm.classList.remove("hidden");
      resendBlock.classList.remove("hidden");
    }

    async function parseResponse(response) {
      const text = await response.text();
      if (!text) return {};
      try {
        return JSON.parse(text);
      } catch {
        return { message: text };
      }
    }

    async function requestResetEmail(email) {
      const endpoint = `${SUPABASE_URL}/auth/v1/recover?redirect_to=${encodeURIComponent(REDIRECT_TO)}`;
      const response = await fetch(endpoint, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "content-type": "application/json"
        },
        body: JSON.stringify({ email })
      });
      const payload = await parseResponse(response);
      if (!response.ok) {
        throw new Error(payload.message || payload.error_description || "重置邮件发送失败，请稍后重试。");
      }
    }

    async function updatePassword(password) {
      const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        method: "PUT",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "authorization": `Bearer ${accessToken}`,
          "content-type": "application/json"
        },
        body: JSON.stringify({ password })
      });
      const payload = await parseResponse(response);
      if (!response.ok) {
        throw new Error(payload.message || payload.error_description || "密码更新失败，链接可能已过期。");
      }
    }

    requestForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearMessage();
      const email = String(new FormData(requestForm).get("email") || "").trim().toLowerCase();
      if (!email || !email.includes("@")) {
        setMessage("请输入有效邮箱地址。", "error");
        return;
      }

      requestButton.disabled = true;
      requestButton.textContent = "发送中...";
      try {
        await requestResetEmail(email);
        setMessage("如果该邮箱已注册，新的密码重置邮件会在几分钟内送达。请打开最新邮件中的链接。", "success");
      } catch (error) {
        setMessage(error instanceof Error ? error.message : "重置邮件发送失败，请稍后重试。", "error");
      } finally {
        requestButton.disabled = false;
        requestButton.textContent = "发送重置邮件";
      }
    });

    updateForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearMessage();
      const form = new FormData(updateForm);
      const password = String(form.get("password") || "");
      const confirmPassword = String(form.get("confirmPassword") || "");

      if (password.length < 8) {
        setMessage("新密码至少需要 8 个字符。", "error");
        return;
      }
      if (password !== confirmPassword) {
        setMessage("两次输入的新密码不一致。", "error");
        return;
      }

      updateButton.disabled = true;
      updateButton.textContent = "更新中...";
      try {
        await updatePassword(password);
        updateForm.reset();
        window.history.replaceState(null, "", window.location.pathname);
        setMessage("密码已更新。请回到 SciFlow Pro，用新密码重新登录。", "success");
        showRequestMode();
      } catch (error) {
        setMessage(error instanceof Error ? error.message : "密码更新失败，链接可能已过期。", "error");
        resendBlock.classList.remove("hidden");
      } finally {
        updateButton.disabled = false;
        updateButton.textContent = "更新密码";
      }
    });

    showRequestButton.addEventListener("click", () => {
      clearMessage();
      showRequestMode();
    });

    if (errorCode) {
      showRequestMode();
      setMessage(errorDescription || "密码重置链接无效或已过期，请重新发送重置邮件。", "warn");
    } else if (accessToken && tokenType === "recovery") {
      window.history.replaceState(null, "", window.location.pathname);
      showUpdateMode();
      setMessage("链接验证通过，请设置新密码。", "success");
    } else {
      showRequestMode();
    }
  </script>
</body>
</html>
